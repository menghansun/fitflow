name: fitflow
description: A fitness and swimming tracking app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  table_calendar: ^3.1.2
  fl_chart: 0.68.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  confetti: ^0.7.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_gallery_saver_plus: ^4.0.0
  path_provider: ^2.1.5
  file_picker: ^8.1.6

  # Supabase
  supabase_flutter: ^2.5.0

  # OCR & Image Picker
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  image: ^4.5.4

  # Video player
  video_player: ^2.9.2
  chewie: ^1.8.5
  wakelock_plus: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  path: ^1.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/exercises/
    - assets/splash.gif
    - assets/achievement/
    - assets/legal/
    - assets/body_front.jpeg
    - assets/body_back.jpeg
